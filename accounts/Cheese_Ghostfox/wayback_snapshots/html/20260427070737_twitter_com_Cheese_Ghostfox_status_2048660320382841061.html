  well，狐的月度手部护理完成喵!
  <br/>
  大概是先用两盆温度不同的水做一下温度理疗配合按摩放松关节与韧带，同时松解角质
  <br/>
  然后刷水杨酸+乳酸去角质，再敷一种狐自制的复配溶液(酵母裂解滤液，烟酰胺，以及一点点角鲨烷)进行保湿与修复
  <br/>
  流程的目的是去除日常使用中产生的积累角质，保证精密操作时与工具的理想机械链接以及确保有足够高的触觉分辨率
  <br/>
  这双手的缺点就是怕热怕晒怕磨，几乎告别重载工况了🙃
  <br/>
  狐磨刀/练缝合/开锁/精密锡焊/称量配药的时候有多爽
